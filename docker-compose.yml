version: '3.8'

services:
  openclaw-gateway:
    image: openclaw/gateway:latest
    container_name: openclaw-gateway
    ports:
      - "8000:8000"
    environment:
      OPENCLAW_ROOT_PASSWORD: ${OPENCLAW_ROOT_PASSWORD}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./config.json:/app/config.json
      - ./km-vault:/app/km-vault
      - ./memory:/app/memory
      - ./agents:/app/agents
    networks:
      - myteam-network

  tradingview-mcp:
    image: atilaahmet/tradingview-mcp:latest
    restart: unless-stopped
    container_name: tradingview-mcp
    ports:
      - "3001:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    networks:
      - myteam-network

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./services/searxng/settings.yml:/etc/searxng/settings.yml
    networks:
      - myteam-network

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: always
    ports:
      - "8081:8080"
    networks:
      - myteam-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PASSWORD: ${N8N_PASSWORD}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET}
      N8N_API_KEY: ${N8N_API_KEY}
    volumes:
      - ./n8n/data:/home/node/.n8n
    networks:
      - myteam-network

  discord-chief:
    image: openclaw/discord-bot:latest
    container_name: discord-chief
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN_chief}
      DISCORD_SERVER_ID: ${DISCORD_SERVER_ID}
      AGENT_NAME: chief
    networks:
      - myteam-network

  discord-analyst:
    image: openclaw/discord-bot:latest
    container_name: discord-analyst
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN_analyst}
      DISCORD_SERVER_ID: ${DISCORD_SERVER_ID}
      AGENT_NAME: analyst
    networks:
      - myteam-network

  discord-forex-executor:
    image: openclaw/discord-bot:latest
    container_name: discord-forex-executor
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN_forex_executor}
      DISCORD_SERVER_ID: ${DISCORD_SERVER_ID}
      AGENT_NAME: forex_executor
    networks:
      - myteam-network

  discord-crypto-executor:
    image: openclaw/discord-bot:latest
    container_name: discord-crypto-executor
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN_crypto_executor}
      DISCORD_SERVER_ID: ${DISCORD_SERVER_ID}
      AGENT_NAME: crypto_executor
    networks:
      - myteam-network

networks:
  myteam-network:
    driver: bridge

  # The Unified Trading MCP Server (trading-mcp) runs directly on a Windows machine
  # because the MetaTrader5 Python Library requires access to the MT5 terminal
  # which typically runs on Windows. Therefore, it is not included in this Docker Compose setup.
  # Agents in Docker can access it via http://host.docker.internal:${TRADING_MCP_PORT}
